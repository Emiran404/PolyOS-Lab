name: PolyOS Lab CI/CD Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-increment Tag
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v1.0.5"
          else
            VERSION=${LATEST_TAG#v}
            IFS='.' read -r major minor patch <<< "$VERSION"
            patch=$((patch + 1))
            NEW_TAG="v${major}.${minor}.${patch}"
          fi
          echo "Determined new tag: $NEW_TAG"
          echo "tag_name=$NEW_TAG" >> $GITHUB_ENV
          echo "version_num=${NEW_TAG#v}" >> $GITHUB_ENV
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG

      # 1. Set up Go & Build (Client & Server)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'
          cache-dependency-path: |
            server/go.sum
            client/go.sum

      - name: Compile Go Binaries
        run: |
          cd server
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o polyos-server main.go
          cd ../client
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o polyos-client main.go

      # 2. Node.js & Electron/React Build (bundles polyos-server)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Build Teacher Dashboard (.deb)
        run: |
          cd dashboard
          npm ci
          npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Create Server Debian Package (.deb)
      - name: Package Server into .deb
        run: |
          VERSION=${{ env.version_num }}
          PKG_DIR="polyos-server_${VERSION}_amd64"
          mkdir -p $PKG_DIR/DEBIAN
          mkdir -p $PKG_DIR/usr/bin
          cp server/polyos-server $PKG_DIR/usr/bin/
          
          cat <<EOF > $PKG_DIR/DEBIAN/control
          Package: polyos-server
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Emirhan Gok <emiran404@github.com>
          Description: PolyOS Lab central management server
          EOF
          
          dpkg-deb --build $PKG_DIR

      # 4. Create Client Debian Package (.deb) with Autostart & Systemd Daemon
      - name: Package Client into .deb
        run: |
          VERSION=${{ env.version_num }}
          PKG_DIR="polyos-client_${VERSION}_amd64"
          mkdir -p $PKG_DIR/DEBIAN
          mkdir -p $PKG_DIR/usr/bin
          mkdir -p $PKG_DIR/lib/systemd/system
          
          # Copy client binary
          cp client/polyos-client $PKG_DIR/usr/bin/
          
          # Create systemd service
          cat <<EOF > $PKG_DIR/lib/systemd/system/polyos-client.service
          [Unit]
          Description=PolyOS Lab Client Service
          After=network.target display-manager.service
          
          [Service]
          Type=simple
          ExecStart=/usr/bin/polyos-client
          Restart=always
          RestartSec=5
          Environment=DISPLAY=:0
          Environment=XAUTHORITY=/var/run/lightdm/root/:0
          
          [Install]
          WantedBy=graphical.target
          EOF
          
          # Create control file
          cat <<EOF > $PKG_DIR/DEBIAN/control
          Package: polyos-client
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: xinput, scrot, xdotool, xclip, python3, python3-tk
          Maintainer: Emirhan Gok <emiran404@github.com>
          Description: PolyOS Lab student client daemon
          EOF
          
          # Create postinst script
          cat <<EOF > $PKG_DIR/DEBIAN/postinst
          #!/bin/sh
          set -e
          systemctl daemon-reload
          systemctl enable polyos-client.service
          systemctl start polyos-client.service
          EOF
          chmod 755 $PKG_DIR/DEBIAN/postinst
          
          # Create prerm script
          cat <<EOF > $PKG_DIR/DEBIAN/prerm
          #!/bin/sh
          set -e
          systemctl stop polyos-client.service || true
          systemctl disable polyos-client.service || true
          EOF
          chmod 755 $PKG_DIR/DEBIAN/prerm
          
          dpkg-deb --build $PKG_DIR

      # 5. Upload Assets and Create/Update Release
      - name: Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dashboard/release/*.deb
            polyos-server_${{ env.version_num }}_amd64.deb
            polyos-client_${{ env.version_num }}_amd64.deb
            RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
